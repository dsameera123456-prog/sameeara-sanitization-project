<!DOCTYPE html>
<html>

<head>
  <title>Smart Sanitation System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; }
    section { padding:60px 20px; }
    .nav {
      position:fixed; top:0; width:100%;
      background:#0d47a1; padding:10px;
      display:flex; justify-content:center; gap:15px;
    }
    .nav a { color:white; text-decoration:none; }

    input, button { padding:10px; margin:5px; }
    #home { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#e3f2fd; }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#home">Home</a>
  <a href="#login">Login</a>
  <a href="#dashboard">Dashboard</a>
  <a href="#feedback">Feedback</a>
</div>

<!-- HOME -->
<section id="home">
  <h1>Smart Sanitation Project</h1>
  <p>CSP / MSME Project</p>
</section>

<!-- LOGIN -->
<section id="login">
  <h2>Login / Guest Access</h2>

  <input id="email" placeholder="Enter Email"><br>

  <button onclick="emailLogin()">Login with Email</button>
  <button onclick="guestLogin()">Continue as Guest</button>

  <p id="status"></p>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h2>Live Dashboard</h2>

  <p>👥 Total Users: <span id="users">0</span></p>
  <p>💬 Feedback: <span id="fcount">0</span></p>
</section>

<!-- FEEDBACK -->
<section id="feedback">
  <h2>Feedback</h2>

  <input id="name" placeholder="Name"><br>
  <input id="msg" placeholder="Message"><br>

  <button onclick="sendFeedback()">Submit</button>

  <div id="list"></div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC0Jos76V8Vot3AYEAubYEAubJ7Tg04EOFywFQ0",
  authDomain: "smart-sanitization-project.firebaseapp.com",
  projectId: "smart-sanitization-project",
  storageBucket: "smart-sanitization-project.firebasestorage.app",
  messagingSenderId: "724851096201",
  appId: "1:724851096201:web:1bfb0f90595382d9982458",
  measurementId: "G-LWYFQMP1JH"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* USERS COLLECTION */
function addUser(type, email="guest") {
  db.collection("users").add({
    type: type,
    email: email,
    time: new Date()
  });
}

/* EMAIL LOGIN */
function emailLogin() {
  let email = document.getElementById("email").value;

  if(email === "") {
    alert("Enter email");
    return;
  }

  addUser("email", email);
  document.getElementById("status").innerText = "Logged in as " + email;
}

/* GUEST LOGIN */
function guestLogin() {
  addUser("guest", "guest");
  document.getElementById("status").innerText = "Logged in as Guest";
}

/* FEEDBACK */
function sendFeedback() {
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  db.collection("feedback").add({
    name: name,
    msg: msg,
    time: new Date()
  });

  alert("Feedback sent!");
}

/* LOAD DATA */
function loadData() {

  db.collection("users").onSnapshot(snap => {
    document.getElementById("users").innerText = snap.size;
  });

  db.collection("feedback").onSnapshot(snap => {
    document.getElementById("fcount").innerText = snap.size;
  });

}
loadData();

</script>

</body>
</html>
