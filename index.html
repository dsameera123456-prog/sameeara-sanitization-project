<!DOCTYPE html>
<html>
<head>
  <title>Smart Sanitation Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; }
    section { padding:60px 20px; }
    .nav {
      position:fixed;
      top:0;
      width:100%;
      background:#0d47a1;
      display:flex;
      justify-content:center;
      gap:15px;
      padding:10px;
    }
    .nav a { color:white; text-decoration:none; }
    input, button { padding:10px; margin:5px; }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#home">Home</a>
  <a href="#login">Login</a>
  <a href="#dashboard">Dashboard</a>
  <a href="#feedback">Feedback</a>
</div>

<!-- HOME -->
<section id="home">
  <h1>Smart Sanitation System</h1>
  <p>CSP / MSME Project</p>
</section>

<!-- LOGIN -->
<section id="login">
  <h2>Login / Guest</h2>

  <input id="email" placeholder="Enter Email"><br>

  <button onclick="emailLogin()">Login</button>
  <button onclick="guestLogin()">Guest</button>

  <p id="status"></p>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h2>Live Dashboard</h2>

  <p>👥 Users: <span id="users">0</span></p>
  <p>💬 Feedback: <span id="fcount">0</span></p>
</section>

<!-- FEEDBACK -->
<section id="feedback">
  <h2>Feedback</h2>

  <input id="name" placeholder="Name"><br>
  <input id="msg" placeholder="Message"><br>

  <button onclick="sendFeedback()">Submit</button>
</section>

<!-- FIREBASE ONLY (IMPORTANT FIXED VERSION) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0Jos76V8Vot3AYEAubJ7Tg04EOFywFQ0",
  authDomain: "smart-sanitization-project.firebaseapp.com",
  projectId: "smart-sanitization-project",
  storageBucket: "smart-sanitization-project.firebasestorage.app",
  messagingSenderId: "724851096201",
  appId: "1:724851096201:web:1bfb0f90595382d9982458"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.emailLogin = async function() {
  let email = document.getElementById("email").value;
  if(!email) return alert("Enter email");

  await addDoc(collection(db, "users"), {
    type: "email",
    email: email,
    time: new Date()
  });

  document.getElementById("status").innerText = "Logged in: " + email;
}

/* GUEST */
window.guestLogin = async function() {
  await addDoc(collection(db, "users"), {
    type: "guest",
    email: "guest",
    time: new Date()
  });

  document.getElementById("status").innerText = "Guest login success";
}

/* FEEDBACK */
window.sendFeedback = async function() {
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  if(!name || !msg) return alert("Fill all fields");

  await addDoc(collection(db, "feedback"), {
    name,
    msg,
    time: new Date()
  });

  alert("Feedback sent!");
}

/* LIVE COUNTS */
onSnapshot(collection(db, "users"), (snap) => {
  document.getElementById("users").innerText = snap.size;
});

onSnapshot(collection(db, "feedback"), (snap) => {
  document.getElementById("fcount").innerText = snap.size;
});

</script>

</body>
</html>
