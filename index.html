<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanitation Awareness Project</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7f8;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:#00695c;
  display:flex;
  justify-content:center;
  gap:15px;
  padding:10px;
}
.nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* HOME */
.home{
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url("img1.jpg") center/cover;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* SLIDER */
.slider{
  width:90%;
  margin:auto;
  overflow:hidden;
  border-radius:10px;
}
.slides{
  display:flex;
  transition:0.5s;
}
.slides img{
  width:100%;
  height:250px;
  object-fit:cover;
}

/* BLOCKS */
.blocks{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

.block{
  background:linear-gradient(135deg,#00c853,#64dd17);
  color:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  transition:0.3s;
}
.block:hover{
  transform:scale(1.05);
}

/* SPECIAL COLORS */
.block:nth-child(2){background:linear-gradient(135deg,#2196f3,#03a9f4);}
.block:nth-child(3){background:linear-gradient(135deg,#ff9800,#ff5722);}
.block:nth-child(4){background:linear-gradient(135deg,#9c27b0,#e91e63);}

/* SECTIONS */
section{
  padding:60px 20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<a href="#home">Home</a>
<a href="#slider">Gallery</a>
<a href="#blocks">Features</a>
<a href="#hygiene">Hygiene</a>
</div>

<!-- HOME -->
<section id="home" class="home">
<h1>Sanitation Awareness Project</h1>
<p>Clean India • Healthy Life</p>
</section>

<!-- SLIDER -->
<section id="slider">
<h2 style="text-align:center;">Gallery</h2>

<div class="slider">
<div class="slides" id="slideBox">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
</div>
</div>
</section>

<!-- BLOCKS -->
<section id="blocks">
<h2 style="text-align:center;">Our Features</h2>

<div class="blocks">
<div class="block">📷 Images</div>
<div class="block">🎥 Videos</div>
<div class="block">📊 Project</div>
<div class="block">💬 Feedback</div>
</div>
</section>

<!-- HYGIENE -->
<section id="hygiene">
<h2 style="text-align:center;">Hygiene Awareness</h2>

<div class="blocks">
<div class="block">🧼 Hand Wash</div>
<div class="block">🚿 Body Clean</div>
<div class="block">🌸 Menstrual Care</div>
<div class="block">🏡 Clean Surroundings</div>
</div>
</section>

<!-- SLIDER JS -->
<script>
let i = 0;
setInterval(()=>{
  let box = document.getElementById("slideBox");
  i++;
  if(i>3) i=0;
  box.style.transform = "translateX(" + (-100*i) + "%)";
}, 2000);
</script>

</body>
</html>
